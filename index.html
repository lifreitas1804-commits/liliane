<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liliane Freitas</title>
    <meta charset="UTF-8">
    <title>Menu Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
    <style>
            /* Reset básico */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Fundo geral */
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #009c3b, #ffdf00);
    }

    /* Menu */
    .menu {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #002776;
        padding: 15px 30px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    /* Logo */
    .logo {
        color: #ffdf00;
        font-size: 24px;
    }

    /* Lista */
    .menu ul {
        list-style: none;
        display: flex;
    }

    /* Itens */
    .menu li {
        margin-left: 20px;
    }

    /* Links */
    .menu a {
        text-decoration: none;
        color: white;
        font-weight: bold;
        padding: 8px 12px;
        transition: 0.3s;
        border-radius: 5px;
    }

    /* Hover */
    .menu a:hover {
        background-color: #009c3b;
        color: #ffdf00;
    }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <nav class="menu">
                <h1 class="logo">⚽ Copa 2026</h1>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Seleções</a></li>
                    <li><a href="#">Jogos</a></li>
                    <li><a href="#">Tabela</a></li>
                    <li><a href="#">Notícias</a></li>
                </ul>
            </nav>
        </header>
        <section>
            
        </section>

        <footer>
            <p>Liliane Freitas</p>
        </footer>
    </div>
</body>
</html>
